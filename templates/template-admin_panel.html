<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="">
  <title>Nginx Redirects Manager</title>
  <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" sizes="48x48">
  <link rel="icon" href="{{ url_for('static', filename='images/favicon.svg') }}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/apple-touch-icon.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='images/site.webmanifest') }}">
  <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet" crossorigin="anonymous">
  <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}" crossorigin="anonymous" defer></script>
  <style>
    body { padding-top: 70px; }
    .settings-label { min-width: 260px; justify-content: flex-end; }
  </style>
</head>
<body>
<main>
<div>
  <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">🎮Адмін-панель</a>
      <span class="spinner-border text-warning ms-2" role="status" id="spinnerLoading" style="visibility: hidden;"></span>
      <div class="ms-auto d-flex align-items-center">
        <a href="/" class="btn btn-info me-2">⬅На головну</a>
        <form class="d-flex" action="/logout" method="POST">
          <button class="btn btn-danger" type="submit" name="logout">{{ current_user.realname }}&nbsp;Вихід</button>
        </form>
      </div>
    </div>
  </nav>
</div>
<ul class="nav nav-tabs">
  <li class="nav-item"><a class="nav-link {{active1|safe}}" href="/admin_panel/settings">Налаштування:</a></li>
  <li class="nav-item"><a class="nav-link {{active2|safe}}" href="/admin_panel/users">Користувачі:</a></li>
</ul>
<br>
{{data|safe}}
</main>
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="myModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="myModalLabel">Інформація:</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
      </div>
      <div class="modal-body">
        <ul class=flashes style="margin-top: 33px; white-space: pre-line;" id="message">
          {% for category, message in messages %}
          <li class="{{ category }}">{{ message }}</li>
          {% endfor %}
        </ul>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" autofocus>Ясно-понятно</button>
      </div>
    </div>
  </div>
</div>
{% endif %}
{% endwith %}
  <script src="{{ url_for('static', filename='js/admin_panel.js') }}"></script>
</body>
</html>
